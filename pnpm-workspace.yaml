# backend/ は P1 Step1 で追加した（Hono + TS の Cloud Run バックエンド）。
# packages/* は柱2からのsubtree取込み（packages/jp-corp-core/SYNC.md参照・改変禁止）。
packages:
  - "apps-script"
  - "backend"
  - "packages/*"

# esbuild は postinstall でネイティブバイナリを取得するためビルド許可が必要。
# protobufjs は @google-cloud/firestore（FR-9 無料枠カウント）の推移依存で postinstall を持つ。
# pnpm 11 では onlyBuiltDependencies ではなく allowBuilds が有効（pnpm approve-builds <名> で生成）。
allowBuilds:
  esbuild: true
  protobufjs: true
