<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ライセンスキーの再表示 — 会社リストクリーナー for Google Sheets</title>
  <meta name="description" content="ライセンスキーを忘れた方向けの再表示フォーム。お申し込み時のメールアドレスから、有効なライセンスキーを再表示します。">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <p class="site-title"><a href="index.html" style="text-decoration:none;color:inherit;">会社リストクリーナー for Google Sheets</a></p>
      <nav class="site-nav">
        <a href="index.html">トップ</a>
        <a href="index.html#pricing">料金</a>
      </nav>
    </div>
  </header>

  <main class="doc">
    <div class="wrap">
      <h1>ライセンスキーの再表示</h1>
      <p>ライセンスキーを忘れた方は、お申し込み時のメールアドレスを入力してください。有効な Pro プランのご契約が確認できた場合に、ライセンスキーを再表示します。</p>

      <form id="recover-form" style="margin:24px 0;">
        <label for="email" style="font-weight:700;">メールアドレス</label><br>
        <input id="email" name="email" type="email" required autocomplete="email"
          style="width:100%;max-width:420px;margin:8px 0;padding:10px;border:1px solid var(--border);border-radius:6px;font-size:1rem;">
        <br>
        <button id="submit-btn" class="btn" type="submit">キーを再表示する</button>
      </form>

      <div id="status" style="margin:16px 0;">
        <p id="message"></p>
        <div id="key-box" style="display:none;">
          <label for="license-key" style="font-weight:700;">ライセンスキー</label>
          <textarea id="license-key" readonly rows="3"
            style="width:100%;margin:8px 0;padding:10px;border:1px solid var(--border);border-radius:6px;font-family:monospace;font-size:0.85rem;word-break:break-all;"></textarea>
          <button id="copy-btn" class="btn" type="button">コピーする</button>
          <p id="copy-done" style="display:none;color:var(--accent);margin-top:8px;">コピーしました。</p>
        </div>
      </div>

      <p class="updated">
        ※ 解約済みでも、当該課金期間の満了までは Pro 機能を利用できます。ご契約が満了・解約済みの場合はキーを再表示できません。
      </p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <nav>
        <a href="index.html">トップ</a>
        <a href="privacy.html">プライバシーポリシー</a>
        <a href="terms.html">利用規約</a>
        <a href="tokushoho.html">特定商取引法に基づく表記</a>
      </nav>
      <p>&copy; 山本美奈子 会社リストクリーナー</p>
    </div>
  </footer>

  <script>
    // バックエンド(Cloud Run)のURL。デプロイ後に実URLへ差し替える。
    const BACKEND_URL = ''; // TODO: Cloud RunデプロイURL

    (function () {
      const form = document.getElementById('recover-form');
      const emailEl = document.getElementById('email');
      const submitBtn = document.getElementById('submit-btn');
      const messageEl = document.getElementById('message');
      const keyBox = document.getElementById('key-box');
      const keyField = document.getElementById('license-key');
      const copyBtn = document.getElementById('copy-btn');
      const copyDone = document.getElementById('copy-done');

      function showMessage(text) {
        messageEl.textContent = text;
        keyBox.style.display = 'none';
      }

      function showKey(key) {
        keyField.value = key;
        messageEl.textContent = 'ライセンスキーを再表示しました。下記をコピーしてサイドバーに入力してください。';
        keyBox.style.display = 'block';
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        copyDone.style.display = 'none';

        // BACKEND_URL 未設定時は無言で失敗せず「準備中」を表示する。
        if (!BACKEND_URL) {
          showMessage('ただいま準備中です。キーの再表示環境が整うまでお待ちください。');
          return;
        }

        const email = (emailEl.value || '').trim();
        if (!email) {
          showMessage('メールアドレスを入力してください。');
          return;
        }

        submitBtn.disabled = true;
        showMessage('確認しています…');

        fetch(BACKEND_URL.replace(/\/$/, '') + '/license/recover', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ email: email })
        })
          .then(function (res) {
            return res.json().then(function (data) { return { status: res.status, data: data }; });
          })
          .then(function (result) {
            if (result.status === 200 && result.data && typeof result.data.licenseKey === 'string') {
              showKey(result.data.licenseKey);
            } else if (result.status === 429) {
              showMessage('短時間に連続で試行されています。しばらく待ってから再度お試しください。');
            } else {
              showMessage('有効なライセンスが見つかりませんでした。メールアドレスをご確認ください。');
            }
          })
          .catch(function () {
            showMessage('通信に失敗しました。時間をおいて再度お試しください。');
          })
          .finally(function () {
            submitBtn.disabled = false;
          });
      });

      copyBtn.addEventListener('click', function () {
        keyField.select();
        const done = function () { copyDone.style.display = 'block'; };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(keyField.value).then(done, function () {
            document.execCommand('copy');
            done();
          });
        } else {
          document.execCommand('copy');
          done();
        }
      });
    })();
  </script>
</body>
</html>
