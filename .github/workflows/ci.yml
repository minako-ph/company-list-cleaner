name: CI

# push / PR で typecheck・test・build と CR-7 スコープ差分チェックを実行する。
# スコープ差分チェックはビルド前後の2回（ソースと dist/appsscript.json）走らせる。

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check OAuth scopes (source)
        run: node scripts/check-oauth-scopes.mjs

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check OAuth scopes (built dist)
        run: node scripts/check-oauth-scopes.mjs
